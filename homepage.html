<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AskMyNotes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center py-12 px-4">
    <div class="w-full max-w-2xl bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-2">AskMyNotes</h1>
            <p class="text-slate-500">Chat with your PDF notes using AI-powered retrieval.</p>
        </div>

        <div class="flex flex-col gap-8">
            <!-- Upload Section -->
            <div class="space-y-3">
                <label for="pdf-input" class="block text-sm font-medium text-slate-700">Upload your notes (PDF)</label>
                <input type="file" id="pdf-input" accept=".pdf" 
                       class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-slate-100 file:text-slate-700 hover:file:bg-slate-200 transition cursor-pointer">
                <div id="upload-status" class="text-xs text-slate-400">No file uploaded yet.</div>
            </div>

            <!-- Question Section -->
            <div class="space-y-3">
                <label for="question" class="block text-sm font-medium text-slate-700">Your question</label>
                <textarea id="question" rows="3" 
                          placeholder="What do my notes say about..." 
                          class="block w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition"></textarea>
                <div class="flex items-center justify-between">
                    <div id="status" class="text-xs text-slate-400"></div>
                    <button id="ask-btn" class="bg-blue-600 text-white py-2 px-6 rounded-lg font-medium hover:bg-blue-700 transition shadow-sm active:scale-95">
                        Submit
                    </button>
                </div>
            </div>

            <!-- Answer Section -->
            <div class="space-y-3">
                <label class="block text-sm font-medium text-slate-700">Answer</label>
                    <div id="meta" class="flex gap-2">
                        <span id="type-pill" class="px-2 py-1 rounded text-xs bg-slate-200 text-slate-700 hidden"></span>
                        <span id="tool-pill" class="px-2 py-1 rounded text-xs bg-slate-200 text-slate-700 hidden"></span>
                    </div>

                <div id="answer" class="p-4 bg-slate-50 border border-slate-200 rounded-lg min-h-[100px] text-slate-600 italic">
                    <div id="answer-text">Your answer will appear here...</div>
                </div>
                 <details id="sources-wrap" class="hidden mt-4 text-sm text-slate-600">
                   <summary class="cursor-pointer">Sources (top chunks used)</summary>
                   <ol id="sources" class="list-decimal pl-6 mt-2 space-y-2"></ol>
                 </details>

            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-8 text-slate-400 text-xs">
        Built as part of the AI Engineering Bootcamp
    </footer>
</body>
</html>
